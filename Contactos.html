    <h1 class="centrado" >Contactenos</h1>
    <div class="container" style="text-align: center;align-items: center; align-content: center;">
      <div class="row">
          <!-- DETALLE -->
          <div class="col-4">
              <form id="frm" >
                  <div class="form-group">
                    <p>Nombre</p>
                      <input style="border-radius: 10px; height: 30px;" type="text" id="txtNombre" class="form-control Barra" placeholder="Nombre">
                  
                  </div>
                  <div class="form-group" >
                    <p>Apellidos</p>
                      <input style="border-radius: 10px; height: 30px;" type="text" id="txtApellidos" class="form-control Barra" placeholder="Apellidos">
                  
                  </div>
                  <div class="form-group" >
                    <p>Correo electrónico</p>
                      <input style="border-radius: 10px; height: 30px;" type="text" id="txtCorreo" class="form-control Barra" placeholder="Correo">
                  
                  </div>
                  <div class="form-group" >
                    <p>Teléfono</p>
                      <input style="border-radius: 10px; height: 30px;" type="text" id="txtTelefono" class="form-control Barra" placeholder="Teléfono">
                  
                  </div>
                  <div class="form-group" >
                     <p>Dirección</p>
                      <input style="border-radius: 10px; height: 30px;" type="text" id="txtDireccion" class="form-control Barra" placeholder="Dirección">
                  </div>
                  <div class="form-group" >
                    <p>Mensaje</p>
                    <textarea style="height: 100px; width: 300px; border-radius: 10px; " class="form-control txtArea" placeholder="Mensaje" type="text" name="txtMensaje" id="txtMensaje" cols="30" rows="10"></textarea>
                </div>
                  <button style="border-radius: 5px; font-size: 25px; background-color:black ; color: white; font-family: steelfish;" id="btnGuardar" class="btn btn-primary">Guardar</button>
                  <button style="border-radius: 5px; font-size: 25px; background-color:black ; color: white; font-family: steelfish;" type="button" id="btn-Limpiar" class="btn btn-success">Limpiar</button>
              </form>
          </div>
